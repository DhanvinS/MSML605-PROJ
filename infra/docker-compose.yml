version: "3.9"

services:
  inference-api:
    build:
      context: ../
      dockerfile: infra/docker/Dockerfile.inference
    image: stock-prediction/inference:latest
    container_name: inference-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/models/latest
      - MODEL_S3_BUCKET=${S3_BUCKET_NAME}
      - MODEL_S3_PREFIX=models/latest
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data
    networks:
      - app-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: ../
      dockerfile: infra/docker/Dockerfile.dashboard
    image: stock-prediction/dashboard:latest
    container_name: dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://inference-api:8000
      - DRIFT_REPORT_PATH=/app/data/baseline/latest_drift_report.json
      - PREDICTIONS_LOG_PATH=/app/data/monitoring/predictions_log.parquet
      - DRIFT_HISTORY_PATH=/app/data/monitoring/drift_history.parquet
      - LATENCY_HISTORY_PATH=/app/data/monitoring/latency_history.parquet
      - RETRAIN_EVENTS_PATH=/app/data/monitoring/retrain_events.json
    volumes:
      - ../data:/app/data:ro
    depends_on:
      inference-api:
        condition: service_healthy
    networks:
      - app-net
    restart: unless-stopped

  monitoring-agent:
    build:
      context: ../
      dockerfile: infra/docker/Dockerfile.inference
    image: stock-prediction/inference:latest
    container_name: monitoring-agent
    command: >
      python -c "
      import time, json, requests, pandas as pd
      from src.training.baseline_capture import load_baseline_stats
      from src.monitoring.drift_detector import analyze_drift
      from src.monitoring.cloudwatch_logger import push_drift_metrics
      import os, pathlib

      INTERVAL = int(os.environ.get('DRIFT_CHECK_INTERVAL', 3600))
      API_URL   = os.environ.get('API_URL', 'http://inference-api:8000')
      BUCKET    = os.environ.get('S3_BUCKET_NAME', '')
      REPORT_OUT = pathlib.Path('/app/data/baseline/latest_drift_report.json')
      REPORT_OUT.parent.mkdir(parents=True, exist_ok=True)

      while True:
          try:
              resp = requests.get(f'{API_URL}/inference-log', timeout=10)
              records = resp.json().get('records', [])
              if len(records) >= 50:
                  baseline = load_baseline_stats(s3_bucket=BUCKET)
                  df = pd.DataFrame(records)
                  report = analyze_drift(baseline, df)
                  REPORT_OUT.write_text(json.dumps(report.to_dict(), indent=2))
                  if BUCKET:
                      push_drift_metrics(report)
                  print('Drift check complete:', report.to_dict())
              else:
                  print(f'Only {len(records)} samples, skipping drift check (need >= 50)')
          except Exception as e:
              print(f'Monitoring error: {e}')
          time.sleep(INTERVAL)
      "
    environment:
      - API_URL=http://inference-api:8000
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - DRIFT_CHECK_INTERVAL=3600
    volumes:
      - ../data:/app/data
    depends_on:
      - inference-api
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge
